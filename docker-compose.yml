services:
  postgres:
    image: postgres:17
    container_name: csw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-csw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-csw}
      POSTGRES_DB: ${POSTGRES_DB:-csw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-csw} -d $${POSTGRES_DB:-csw}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: csw-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Enable via: docker compose --profile tools up -d
  asynqmon:
    image: hibiken/asynqmon:latest
    container_name: csw-asynqmon
    profiles: [tools]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "${ASYNQMON_PORT:-8081}:8080"

volumes:
  pgdata:
  redisdata:
