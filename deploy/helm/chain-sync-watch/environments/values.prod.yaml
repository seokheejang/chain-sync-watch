# prod — managed Postgres / Redis, ExternalSecrets-only, HPA + PDB on
# every component, ServiceMonitor on. Bundled subcharts disabled so the
# chart never spins up state in-cluster.
#
#   helm install csw deploy/helm/chain-sync-watch \
#     -f deploy/helm/chain-sync-watch/environments/values.prod.yaml \
#     -n csw --create-namespace
#
# Override `externalSecrets.secretStoreRef.name` and the `data` map for
# your concrete SecretStore before installing.

server:
  replicaCount: 3
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 2

worker:
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

web:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 2

postgresql:
  enabled: false
redis:
  enabled: false

ingress:
  enabled: true
  className: nginx
  host: csw.example.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  apiPath: /api(/|$)(.*)
  apiPathType: ImplementationSpecific
  tls:
    - secretName: csw-prod-tls
      hosts:
        - csw.example.com

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: replace-with-prod-secret-store
  data:
    DATABASE_URL:
      key: csw/prod/database-url
    REDIS_URL:
      key: csw/prod/redis-url
    CSW_SECRET_KEY:
      key: csw/prod/secret-key
    CSW_ADAPTERS__ETHERSCAN__API_KEY:
      key: csw/prod/etherscan-api-key

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
