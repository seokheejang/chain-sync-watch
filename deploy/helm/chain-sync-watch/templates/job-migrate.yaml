{{- if .Values.migrate.enabled -}}
{{/*
Run `csw migrate up` before the app pods start. Helm hooks keep the
Job out of the tracked release manifest: install / upgrade each spawn
a fresh Job, and hook-succeeded cleans it up after a green run (so a
subsequent `helm upgrade` doesn't collide with an immutable Job).

A failed migration leaves the Job behind for diagnostics because of
`before-hook-creation`: only the *next* attempt deletes it.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chain-sync-watch.fullname" . }}-migrate
  labels:
    {{- include "chain-sync-watch.componentLabels" (merge (dict "component" "migrate") .) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "chain-sync-watch.componentSelectorLabels" (merge (dict "component" "migrate") .) | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "chain-sync-watch.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "chain-sync-watch.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["csw", "migrate", "up"]
          envFrom:
            - secretRef:
                name: {{ include "chain-sync-watch.secretName" . }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
