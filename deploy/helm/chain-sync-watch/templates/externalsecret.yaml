{{- if .Values.externalSecrets.enabled -}}
{{/*
ExternalSecret renders into the same k8s Secret name the Deployments
mount via envFrom. The plain Secret template short-circuits when
externalSecrets.enabled=true so we never publish the inline values
alongside the remote-sourced copy.
*/}}
{{- if not .Values.externalSecrets.secretStoreRef.name }}
{{- fail "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" }}
{{- end }}
{{- if not .Values.externalSecrets.data }}
{{- fail "externalSecrets.data must list at least DATABASE_URL, REDIS_URL, CSW_SECRET_KEY when externalSecrets.enabled=true" }}
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "chain-sync-watch.secretName" . }}
  labels:
    {{- include "chain-sync-watch.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
  target:
    name: {{ include "chain-sync-watch.secretName" . }}
    creationPolicy: Owner
  data:
    {{- range $envName, $ref := .Values.externalSecrets.data }}
    - secretKey: {{ $envName }}
      remoteRef:
        key: {{ $ref.key }}
        {{- with $ref.property }}
        property: {{ . }}
        {{- end }}
        {{- with $ref.version }}
        version: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
