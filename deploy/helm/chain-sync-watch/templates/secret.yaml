{{/*
Secrets rendered from .Values.secrets + subchart-derived URLs. Keys
with empty string values are skipped so operators can override a
single key via --set without carrying the whole set.

DATABASE_URL / REDIS_URL fall back to the enabled Bitnami subchart
services — see _helpers.tpl. CSW_SECRET_KEY is mandatory for the
encrypted secret store, so if nothing is supplied we fail the install
early with a legible error rather than crash-looping the server.

When .Values.externalSecrets.enabled is true, this template is a
no-op: the ExternalSecret resource owns the Secret name and writes
the values from the remote store.
*/}}
{{- if .Values.externalSecrets.enabled -}}
{{- /* ExternalSecret owns the target Secret. */ -}}
{{- else -}}
{{- $dbURL := include "chain-sync-watch.databaseURL" . -}}
{{- $redisURL := include "chain-sync-watch.redisURL" . -}}

{{- if not $dbURL }}
{{- fail "DATABASE_URL is required: set .Values.secrets.DATABASE_URL or enable .Values.postgresql.enabled" }}
{{- end }}
{{- if not $redisURL }}
{{- fail "REDIS_URL is required: set .Values.secrets.REDIS_URL or enable .Values.redis.enabled" }}
{{- end }}
{{- if not .Values.secrets.CSW_SECRET_KEY }}
{{- fail "CSW_SECRET_KEY is required: generate with `openssl rand -base64 32` and pass via --set or values file" }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chain-sync-watch.secretName" . }}
  labels:
    {{- include "chain-sync-watch.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ $dbURL | quote }}
  REDIS_URL: {{ $redisURL | quote }}
  {{- range $k, $v := .Values.secrets }}
  {{- if and (ne $k "DATABASE_URL") (ne $k "REDIS_URL") $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
