name: frontend

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    # Phase 9 bootstraps web/; until then there is nothing to build.
    if: ${{ hashFiles('web/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Biome check
        working-directory: web
        run: pnpm biome check .

      - name: Type check
        working-directory: web
        run: pnpm tsc --noEmit

      - name: Build
        working-directory: web
        run: pnpm build
